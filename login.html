<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mầm Xanh - Đăng nhập</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&family=Roboto:wght@400;700&family=Miama&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-white auth-login">
    <div class="split-screen">
      <!-- Visual Section -->
      <div class="split-left login-split">
        <img
          class="split-image"
          src="assets/figma/auth-login-visual.jpg"
          alt="Login Banner"
        />
        <div class="split-overlay multiply"></div>
      </div>

      <!-- Form Section -->
      <div class="split-right bg-cream">
        <!-- Logo Corner -->
        <div class="logo-container">
          <a href="index.html" class="nav-logo">
            <div class="nav-logo-bg-shape"></div>
            <div class="nav-logo-subtitle">Mầm Xanh</div>
            <div class="nav-logo-icon-wrap">
              <img src="assets/figma/auth-login-logo-icon.png" alt="Logo Icon" />
            </div>
          </a>
        </div>

        <div class="form-wrapper">
          <header class="brand-header text-center">
            <h2 class="auth-title">Đăng nhập</h2>
            <h3 class="auth-subtitle">Chào mừng bạn quay trở lại</h3>
          </header>

          <form id="loginForm" class="auth-form">
            <div class="form-group">
              <label class="form-label" for="email">Địa chỉ email</label>
              <div class="input-wrapper" id="email-wrapper">
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="name@example.com"
                  required
                />
              </div>
              <p class="auth-error" id="email-error"></p>
            </div>

            <div class="form-group">
              <div class="label-row">
                <label class="form-label" for="password">Mật khẩu</label>
                <a href="#" class="forgot-link" id="forgot-password"
                  >Forgot Password?</a
                >
              </div>
              <div class="input-wrapper" id="password-wrapper">
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="••••••••"
                  required
                />
              </div>
              <p class="auth-error" id="password-error"></p>
            </div>

            <button type="submit" class="btn btn-primary auth-btn">
              Đăng nhập
            </button>
          </form>

          <div class="divider">
            <span class="divider-line"></span>
            <span class="divider-text">Or continue with</span>
            <span class="divider-line"></span>
          </div>

          <div class="social-logins">
            <button class="btn-social" id="btn-google" type="button">
              <img src="assets/figma/auth-google-icon.svg" alt="Google" />
              <span>Google</span>
            </button>
            <button class="btn-social" id="btn-apple" type="button">
              <img src="assets/figma/auth-apple-icon.svg" alt="Apple" />
              <span>Apple</span>
            </button>
          </div>

          <div class="auth-footer text-center">
            <span class="text-label">Bạn chưa có tài khoản?</span>
            <a href="register.html" class="text-primary font-bold">Đăng ký</a>
          </div>
        </div>
      </div>
    </div>
    <script src="js/store.js"></script>

    <script src="js/login.js"></script>
  </body>
</html>
